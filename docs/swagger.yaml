        Change existing user information
        ### Logic update fields (Three-state logic):
        1. **The field is not transmitted**: `phone_number` ignored, the value in the database does not change
        2. **Passed value**: `"phone_number`": "+71112223344"` - set a new phone number in the database
        3. **Passed null**: `"phone_number`": "null"` - clear a field in the database (set to NULL)
        Restrictions: `full_name ` can't be null
      parameters:
      - description: User id to change
        in: path
        name: id
        required: true
        type: integer
      - description: PatchUser request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_users_transport_http.PatchUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Seccessfull changed user
          schema:
            $ref: '#/definitions/internal_features_users_transport_http.PatchUserResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_daf32_golang-todoapp_internal_core_transport_http_response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_daf32_golang-todoapp_internal_core_transport_http_response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_daf32_golang-todoapp_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/github_com_daf32_golang-todoapp_internal_core_transport_http_response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_daf32_golang-todoapp_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_daf32_golang-todoapp_internal_core_transport_http_response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Change user
      tags:
      - users
securityDefinitions:
  BearerAuth:
    description: Type "Bearer {access_token}"
    in: header
    name: Authorization
    type: apiKey
