name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run tests
        run: go test ./...

      - name: Build application
        run: go build -o /tmp/todoapp ./cmd/todoapp

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install deploy tools
        run: sudo apt-get update && sudo apt-get install -y rsync openssh-client

      - name: Prepare SSH key
        run: |
          printf '%s\n' "${DEPLOY_SSH_KEY}" > deploy_key.pem
          chmod 600 deploy_key.pem
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Create deploy directory
        run: |
          ssh -i deploy_key.pem \
            -p "${{ secrets.DEPLOY_PORT || '22' }}" \
            -o StrictHostKeyChecking=no \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '${{ secrets.DEPLOY_PATH }}'"

      - name: Sync project to server
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env' \
            --exclude 'out' \
            -e "ssh -i deploy_key.pem -p ${{ secrets.DEPLOY_PORT || '22' }} -o StrictHostKeyChecking=no" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Write environment file on server
        run: |
          ssh -i deploy_key.pem \
            -p "${{ secrets.DEPLOY_PORT || '22' }}" \
            -o StrictHostKeyChecking=no \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "printf '%s' '${{ secrets.DEPLOY_ENV_B64 }}' | base64 -d > '${{ secrets.DEPLOY_PATH }}/.env'"

      - name: Run migrations and deploy containers
        run: |
          ssh -i deploy_key.pem \
            -p "${{ secrets.DEPLOY_PORT || '22' }}" \
            -o StrictHostKeyChecking=no \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "
              set -eu
              export PROJECT_ROOT='${{ secrets.DEPLOY_PATH }}'
              cd '${{ secrets.DEPLOY_PATH }}'
              mkdir -p out/logs out/pgdata
              set -a
              . ./.env
              set +a
              docker compose up -d todoapp-postgres
              for i in $(seq 1 30); do
                if docker exec todoapp-env-postgres pg_isready -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" >/dev/null 2>&1; then
                  break
                fi
                if [ "${i}" -eq 30 ]; then
                  echo "Postgres did not become ready in time"
                  exit 1
                fi
                sleep 2
              done
              docker compose run --rm todoapp-postgres-migrate \
                -path /migrations \
                -database 'postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@todoapp-postgres:5432/${POSTGRES_DB}?sslmode=disable' \
                up
              docker compose up -d --build todoapp
            "
