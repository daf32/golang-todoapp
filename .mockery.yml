all: false
dir: "{{.InterfaceDir}}"
filename: mocks.go
force-file-write: true
formatter: goimports
formatter-options:
  goimports:
    all-errors: false
    comments: true
    format-only: true
    fragment: false
    local-prefix: ""
    tab-indent: true
    tab-width: 8
generate: true
include-auto-generated: false
log-level: info
structname: "{{.Mock}}{{.InterfaceName}}"
pkgname: "{{.SrcPackageName}}"
recursive: false
require-template-schema-exists: true
template: testify
template-schema: "{{.Template}}.schema.json"
packages:
  github.com/daf32/golang-todoapp/internal/features/statistics/service:
    interfaces:
      StatisticsRepository:
  github.com/daf32/golang-todoapp/internal/features/tasks/service:
    interfaces:
      TasksRepository:
  github.com/daf32/golang-todoapp/internal/features/users/service:
    interfaces:
      UsersRepository:
      AuthRepository:
  github.com/daf32/golang-todoapp/internal/features/auth/service:
    interfaces:
      AuthRepository:
  github.com/daf32/golang-todoapp/internal/core/mailer:
    interfaces:
      Mailer:
  github.com/daf32/golang-todoapp/internal/core/oauth:
    interfaces:
      Provider:
